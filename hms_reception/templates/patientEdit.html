{% extends 'receptionHome.html' %}
{% block content %}
<head>
    <title>Update Patient Information</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f8fc;
        }

        /* Form container */
        .form-card {
            width: 420px;
            margin: 60px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        .form-card h2 {
            text-align: center;
            color: #0f4c75;
            margin-bottom: 25px;
        }

        /* Labels */
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #0f4c75;
        }

        /* Inputs & Select */
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #dbeafe;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4aa3df;
            box-shadow: 0 0 5px rgba(74, 163, 223, 0.4);
        }

        textarea {
            resize: none;
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #4aa3df;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #0f4c75;
        }
    </style>
</head>

<body>

<div class="form-card">
    <h2>Update Patient Information</h2>

    <form method="post" id="patientEditForm" novalidate>
    {% csrf_token %}

    <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" id="pat_name"
               value="{{ patient.Patient_name }}" required>
        <div style="color:#ef4444;font-size:12px;margin-top:3px;display:none" id="err_name">
            Name must contain only letters and spaces (min 2 characters).
        </div>
    </div>

    <div class="form-group">
        <label>Age</label>
        <input type="number" name="age" id="pat_age"
               min="1" max="150"
               value="{{ patient.Patient_age }}" required>
        <div style="color:#ef4444;font-size:12px;margin-top:3px;display:none" id="err_age">
            Age must be between 1 and 150.
        </div>
    </div>

    <div class="form-group">
        <label>Gender</label>
        <select name="gender" required>
            <option value="">-- Select --</option>
            <option value="Male"   {% if patient.Patient_gender == "Male" %}selected{% endif %}>Male</option>
            <option value="Female" {% if patient.Patient_gender == "Female" %}selected{% endif %}>Female</option>
            <option value="Others" {% if patient.Patient_gender == "Others" %}selected{% endif %}>Others</option>
        </select>
    </div>

    <div class="form-group">
        <label>Phone</label>
        <input type="tel" name="phone" id="pat_phone"
               placeholder="10-digit number"
               value="{{ patient.Patient_phone }}"
               maxlength="10" required>
        <div style="color:#ef4444;font-size:12px;margin-top:3px;display:none" id="err_phone">
            Enter a valid 10-digit phone number.
        </div>
    </div>

    <div class="form-group">
        <label>Address</label>
        <textarea name="address" rows="4" required>{{ patient.Patient_address }}</textarea>
    </div>

    <button type="submit" class="submit-btn">Update</button>
</form>
</div>
</body>

<script>
    document.getElementById('pat_phone').addEventListener('input', function () {
        this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
    });

    document.getElementById('patientEditForm').addEventListener('submit', function (e) {
        let valid = true;
        const name = document.getElementById('pat_name');
        const age = document.getElementById('pat_age');
        const phone = document.getElementById('pat_phone');

        if (!/^[A-Za-z ]{2,}$/.test(name.value.trim())) {
            document.getElementById('err_name').style.display = 'block'; valid = false;
        } else { document.getElementById('err_name').style.display = 'none'; }

        const ageVal = parseInt(age.value);
        if (isNaN(ageVal) || ageVal < 1 || ageVal > 150) {
            document.getElementById('err_age').style.display = 'block'; valid = false;
        } else { document.getElementById('err_age').style.display = 'none'; }

        if (!/^[0-9]{10}$/.test(phone.value)) {
            document.getElementById('err_phone').style.display = 'block'; valid = false;
        } else { document.getElementById('err_phone').style.display = 'none'; }

        if (!valid) e.preventDefault();
    });
</script>

{% endblock %}
