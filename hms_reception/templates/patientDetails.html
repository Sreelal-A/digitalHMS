{% extends 'receptionHome.html' %}
{% block content %}

<!DOCTYPE html>
<html>
<head>
    <title>Patient Information Form</title>

    <style>
        /* Form container */
.form-card {
    width: 360px;              /* reduced width */
    margin: 40px auto;         /* less vertical space */
    background: #ffffff;
    padding: 22px 24px;        /* reduced padding */
    border-radius: 10px;
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
}

/* Title */
.form-card h2 {
    text-align: center;
    color: #0f4c75;
    margin-bottom: 18px;       /* reduced gap */
    font-size: 20px;
}

/* Form group spacing */
.form-group {
    margin-bottom: 12px;       /* tighter spacing */
}

/* Labels */
.form-group label {
    display: block;
    margin-bottom: 4px;
    font-weight: 600;
    color: #0f4c75;
    font-size: 13px;
}

/* Inputs */
.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 8px 10px;         /* reduced height */
    border: 1px solid #dbeafe;
    border-radius: 6px;
    font-size: 13px;
}

/* Address textarea */
.form-group textarea {
    height: 70px;              /* fixed compact height */
    resize: none;
}

/* Focus */
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #4aa3df;
    box-shadow: 0 0 4px rgba(74, 163, 223, 0.4);
}

/* Submit button */
.submit-btn {
    width: 100%;
    margin-top: 14px;
    padding: 10px;             /* smaller button */
    background-color: #4aa3df;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
}

.submit-btn:hover {
    background-color: #0f4c75;
}
 /* Message container */
.toast-container {
            position: fixed;
            top: 20px;
            left: 55%;
            transform: translateX(-50%);
            z-index: 9999;
        }

        .toast {
            background: #1f2937;
            color: #fff;
            padding: 14px 22px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            font-size: 14px;
            animation: slideDown 0.4s ease;
        }

        .toast.success {
            border-left: 5px solid #22c55e;
        }

        .toast.error {
            border-left: 5px solid #ef4444;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
</style>
</head>

<body>

<div class="form-card">
    <h2>Patient Information Form</h2>
     {% if messages %}
    <div class="toast-container">
    {% for message in messages %}
        <div class="toast {{ message.tags }}">
        {{ message }}
        </div>
    {% endfor %}
    </div>
    {% endif %}
    <form action="{% url 'patientSave' %}" method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" pattern="[A-Za-z ]{2,}" title="Name must contain only letters and spaces (min 2 characters)" required>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" min="1" max="150" title="Age must be between 1 and 150" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option value="">-- Select --</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Others">Others</option>
            </select>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="phone" id="phone" pattern="[0-9]{10}" placeholder="10-digit number" maxlength="10" required>
                <div style="color:#ef4444;font-size:12px;margin-top:3px;display:none" id="err_phone">
                    Enter a valid 10-digit phone number.
                </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address" rows="4" required></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
    </form>
</div>

</body>
<script>
        setTimeout(() => {
            const toast = document.querySelector('.toast-container');
            if (toast) toast.remove();
        }, 3000);
    document.getElementById('phone').addEventListener('input', function () {
        this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
    });
</script>
</html>

{% endblock %}
