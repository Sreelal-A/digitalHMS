<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Login</title>
<style>
body {
  font-family: Arial, sans-serif;
  background:linear-gradient(180deg,#c7d8f5 0%, #a9c3eb 60%, #ffffff 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

/* Wrapper */
.login-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Card */
.login-container {
  background: #ffffff;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
  width: 360px;
  text-align: center;
}

.login-container h2 {
  margin-bottom: 25px;
  color: #17627d;
  font-weight: 600;
}

/* Inputs */
.login-container input {
  width: 100%;
  padding: 12px;
  margin: 12px 0;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
  transition: 0.3s;
}

.login-container input:focus {
  outline: none;
  border-color: #2193b0;
  box-shadow: 0 0 8px rgba(33,147,176,0.3);
}

/* Button */
.login-container button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #2193b0;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.login-container button:hover {
  background: #17627d;
  transform: translateY(-2px);
}

/* Links */
.links{
    margin-top:18px;
}

.links a{
    text-decoration:none;
    font-size:14px;
    color:#2f5db3;
    font-weight:500;
}

.link a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-container">
      <h2>Doctor Login</h2>

      {% if messages %}
      <div class="toast-container">
        {% for message in messages %}
        <div class="toast {{ message.tags }}">
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="POST" action="/doctor_login/">
        {% csrf_token %}
        <input type="text" name="username" placeholder="👤 Username" required>
        <input type="password" name="password" placeholder="🔒 Password" required>
        <button type="submit">Login</button>
      </form>

      <div class="links">
        <a href="{% url 'hms_home' %}">← Back to Home</a>
      </div>
    </div>
  </div>
</body>
<script>
        setTimeout(() => {
            const toast = document.querySelector('.toast-container');
            if (toast) toast.remove();
        }, 3000);
</script>
</html>
